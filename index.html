<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Sport Jelentkezés</title>
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>

<body>
    <div class="wrapper glass-panel">
        <h1>Bajnokság Jelentkezés</h1>

        <form id="regForm">

            <div class="form-step active">
                <h2>Csapat Adatai</h2>
                <div class="player-card">
                    <div class="form-group">
                        <label>Csapat neve</label>
                        <input type="text" id="teamName" required autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label>Választott Játék</label>
                        <select id="game" required>
                            <option value="" disabled selected>Válassz játékot...</option>
                            <option value="CS2">Counter-Strike 2</option>
                            <option value="League of Legends">League of Legends</option>
                            <option value="Valorant">Valorant</option>
                        </select>
                    </div>
                    <button type="button" class="btn-next">Tovább</button>
                </div>
            </div>

            <div class="form-step">
                <h2>Csapattagok (1/5)</h2>
                <div class="player-card">
                    <h3>1. Játékos (Csapatkapitány)</h3>
                    <div class="form-group">
                        <label>Név</label>
                        <input type="text" id="pName_1" required>
                    </div>
                    <div class="form-group">
                        <label>Osztály</label>
                        <input type="text" id="pClass_1" required>
                    </div>
                    <div class="form-group">
                        <label>In-Game név</label>
                        <input type="text" id="pIngame_1" required>
                    </div>
                    <div class="form-group">
                        <label>Kapitány kapcsolattartó emailje</label>
                        <input type="email" id="pEmail_1" required>
                    </div>
                    <button type="button" class="btn-next">Tovább</button>
                </div>
            </div>

            <div class="form-step">
                <h2>Csapattagok (2/5)</h2>
                <div class="player-card">
                    <h3>2. Játékos</h3>
                    <div class="form-group">
                        <label>Név</label>
                        <input type="text" id="pName_2" required>
                    </div>
                    <div class="form-group">
                        <label>Osztály</label>
                        <input type="text" id="pClass_2" required>
                    </div>
                    <div class="form-group">
                        <label>In-Game név</label>
                        <input type="text" id="pIngame_2" required>
                    </div>
                    <button type="button" class="btn-next">Tovább</button>
                </div>
            </div>

            <div class="form-step">
                <h2>Csapattagok (3/5)</h2>
                <div class="player-card">
                    <h3>3. Játékos</h3>
                    <div class="form-group">
                        <label>Név</label>
                        <input type="text" id="pName_3" required>
                    </div>
                    <div class="form-group">
                        <label>Osztály</label>
                        <input type="text" id="pClass_3" required>
                    </div>
                    <div class="form-group">
                        <label>In-Game név</label>
                        <input type="text" id="pIngame_3" required>
                    </div>
                    <button type="button" class="btn-next">Tovább</button>
                </div>
            </div>

            <div class="form-step">
                <h2>Csapattagok (4/5)</h2>
                <div class="player-card">
                    <h3>4. Játékos</h3>
                    <div class="form-group">
                        <label>Név</label>
                        <input type="text" id="pName_4" required>
                    </div>
                    <div class="form-group">
                        <label>Osztály</label>
                        <input type="text" id="pClass_4" required>
                    </div>
                    <div class="form-group">
                        <label>In-Game név</label>
                        <input type="text" id="pIngame_4" required>
                    </div>
                    <button type="button" class="btn-next">Tovább</button>
                </div>
            </div>

            <div class="form-step">
                <h2>Csapattagok (5/5)</h2>
                <div class="player-card">
                    <h3>5. Játékos</h3>
                    <div class="form-group">
                        <label>Név</label>
                        <input type="text" id="pName_5" required>
                    </div>
                    <div class="form-group">
                        <label>Osztály</label>
                        <input type="text" id="pClass_5" required>
                    </div>
                    <div class="form-group">
                        <label>In-Game név</label>
                        <input type="text" id="pIngame_5" required>
                    </div>
                    <button type="submit" id="submitBtn">Jelentkezés Leadása</button>
                </div>
            </div>

        </form>

        <div id="statusMessage" class="status-msg"></div>
    </div>

    <script type="module" src="ui.js"></script>
    <script type="module" src="app.js"></script>

</body>

</html>
